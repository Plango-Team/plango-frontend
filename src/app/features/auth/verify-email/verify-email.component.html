<section class="verify-page">
  <div class="card">
    <h1>{{ 'auth.verifyEmail.title' | translate }}</h1>

    <div class="status">
      <p *ngIf="!token()" class="error">
        {{ 'auth.verifyEmail.missingToken' | translate }}
      </p>

      <p *ngIf="token()">
        {{ 'auth.verifyEmail.checking' | translate }}
      </p>

      <p *ngIf="authStore.successMessage()" class="success">
        {{ authStore.successMessage() }}
      </p>

      <p *ngIf="authStore.error()" class="error">
        {{ authStore.error() }}
      </p>
    </div>

    <button type="button" class="action-button" (click)="goToLogin()">
      {{ 'auth.backToLogin' | translate }}
    </button>
  </div>
</section>
