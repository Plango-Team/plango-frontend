<dialog
  #eventModal
  class="m-auto w-full max-w-lg overflow-visible bg-transparent p-0 shadow-none outline-none backdrop:bg-black/55 backdrop:backdrop-blur-sm"
  (cancel)="close()"
>
  <form
    (ngSubmit)="onSubmit()"
    class="max-h-[90vh] overflow-y-auto rounded-2xl border border-ink-border bg-ink-2 p-6 shadow-elevated"
  >
    <h2 class="font-display text-2xl text-ink-fg">إضافة الفعالية إلى جدولك</h2>
    @if (selectedEvent(); as event) {
      <p class="mt-1 text-sm text-ink-muted">{{ event.title }}</p>
    }

    <div class="mt-6 space-y-4">
      <div class="space-y-1.5">
        <div class="flex items-center justify-between gap-3">
          <label class="text-sm font-medium text-ink-fg">نقطة الانطلاق</label>
          <button
            type="button"
            (click)="useCurrentLocation()"
            [disabled]="resolvingLocation()"
            class="text-xs font-medium text-brand disabled:opacity-50"
          >
            {{ resolvingLocation() ? 'جارٍ تحديد الموقع...' : 'استخدم موقعي الحالي' }}
          </button>
        </div>
        <app-location-combobox
          [value]="originName"
          placeholder="ابحث عن نقطة الانطلاق"
          [allowCreate]="false"
          (valueChange)="onOriginNameChange($event)"
          (placeSelected)="onPlaceSelected($event)"
        ></app-location-combobox>
      </div>

      <div class="space-y-1.5">
        <label class="text-sm font-medium text-ink-fg">طريقة التنقل</label>
        <div class="grid grid-cols-2 gap-2 sm:grid-cols-4">
          @for (transport of transports; track transport.id) {
            <button
              type="button"
              (click)="transportation = transport.id"
              class="rounded-lg border px-3 py-2 text-xs transition"
              [class]="
                transportation === transport.id
                  ? 'border-brand bg-brand/10 text-brand'
                  : 'border-ink-border bg-ink text-ink-muted hover:bg-ink-3'
              "
            >
              {{ transport.label }}
            </button>
          }
        </div>
      </div>

      @if (error()) {
        <p class="rounded-lg border border-red-500/30 bg-red-500/10 p-3 text-xs text-red-300">
          {{ error() }}
        </p>
      }
    </div>

    <div class="mt-6 flex justify-end gap-3">
      <button
        type="button"
        (click)="close()"
        class="rounded-lg border border-ink-border px-4 py-2 text-sm text-ink-fg hover:bg-ink-3"
      >
        إلغاء
      </button>
      <button
        type="submit"
        [disabled]="!!store.joiningEventId() || selectedEventStarted()"
        class="rounded-lg bg-brand px-4 py-2 text-sm font-medium text-brand-foreground hover:bg-brand/90 disabled:opacity-50"
      >
        {{ store.joiningEventId() ? 'جارٍ الإضافة...' : 'إضافة إلى الجدول' }}
      </button>
    </div>
  </form>
</dialog>
