<div class="flex h-full flex-col text-ink-fg">
  <!-- Logo Area -->
  <div class="flex h-16 items-center border-b border-ink-border px-6">
        <a class="inline-flex items-center gap-2" routerLink="/" aria-label="PlanGo home">
          <img
            [src]="
              !themeService.isDark()
                ? 'images/planGo-BlackLogo.svg'
                : 'images/planGo-WhiteLogo.svg'
            "
            alt="PlanGo"
          />
        </a>  </div>

  <!-- Smart Appointment Action -->
  <div class="px-3 py-4">
    <button class="flex h-10 w-full items-center justify-start gap-2 rounded-lg bg-ink-fg px-4 text-sm font-medium text-ink hover:bg-ink-fg/90 transition-all">
      <app-icon [iconName]="'Add01Icon'" [iconSize]="16" [iconColor]="'currentColor'"></app-icon>
      موعد ذكي جديد
    </button>
  </div>

  <!-- Navigation Links -->
  <nav class="flex-1 space-y-1 px-3">
    <a routerLink="/user/dashboard" routerLinkActive="bg-ink-3 font-medium text-ink-fg" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm transition text-ink-muted hover:bg-ink-3 hover:text-ink-fg">
      <app-icon [iconName]="'DashboardSquare02Icon'" [iconSize]="16" [iconColor]="'currentColor'"></app-icon>
      نبض اليوم
    </a>
    
    <a routerLink="/user/calendar" routerLinkActive="bg-ink-3 font-medium text-ink-fg" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm transition text-ink-muted hover:bg-ink-3 hover:text-ink-fg">
      <app-icon [iconName]="'Calendar01Icon'" [iconSize]="16" [iconColor]="'currentColor'"></app-icon>
      التقويم
    </a>
    
    <a routerLink="/user/tasks" routerLinkActive="bg-ink-3 font-medium text-ink-fg" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm transition text-ink-muted hover:bg-ink-3 hover:text-ink-fg">
      <app-icon [iconName]="'Task01Icon'" [iconSize]="16" [iconColor]="'currentColor'"></app-icon>
      المهام
    </a>
    
    <a routerLink="/user/map" routerLinkActive="bg-ink-3 font-medium text-ink-fg" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm transition text-ink-muted hover:bg-ink-3 hover:text-ink-fg">
      <app-icon [iconName]="'Location01Icon'" [iconSize]="16" [iconColor]="'currentColor'"></app-icon>
      الخريطة
    </a>
    
    <a routerLink="/user/events" routerLinkActive="bg-ink-3 font-medium text-ink-fg" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm transition text-ink-muted hover:bg-ink-3 hover:text-ink-fg">
      <app-icon [iconName]="'Compass01Icon'" [iconSize]="16" [iconColor]="'currentColor'"></app-icon>
      الفعاليات
    </a>

    <a routerLink="/user/network" routerLinkActive="bg-ink-3 font-medium text-ink-fg" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm transition text-ink-muted hover:bg-ink-3 hover:text-ink-fg">
      <app-icon [iconName]="'UserGroupIcon'" [iconSize]="16" [iconColor]="'currentColor'"></app-icon>
      الشبكة
    </a>
    
    <a routerLink="/user/settings" routerLinkActive="bg-ink-3 font-medium text-ink-fg" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm transition text-ink-muted hover:bg-ink-3 hover:text-ink-fg">
      <app-icon [iconName]="'Settings01Icon'" [iconSize]="16" [iconColor]="'currentColor'"></app-icon>
      الإعدادات
    </a>
  </nav>

  <!-- Bottom CTA / Pro Banner -->
  <div class="p-3">
    <div class="rounded-xl border border-ink-border bg-ink p-4">
      <div class="flex items-center gap-2 text-xs text-ink-fg">
        <app-icon [iconName]="'StarIcon'" [iconSize]="14" [iconColor]="'var(--color-brand)'"></app-icon>
        <span class="font-medium">ترقية للنسخة الاحترافية</span>
      </div>
      <p class="mt-1 text-[11px] text-ink-muted">احصل على ذكاء اصطناعي غير محدود</p>
      <button class="mt-3 h-8 w-full rounded-md bg-brand text-xs font-semibold text-brand-foreground hover:bg-brand/90 transition-all">
        الترقية الآن
      </button>
    </div>
  </div>
</div>
