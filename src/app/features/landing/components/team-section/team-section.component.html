<section id="team" class="relative w-full py-24 bg-(--bg-color) overflow-hidden" dir="rtl">
  <div class="container mx-auto px-6 md:px-12">
    <div class="text-center mb-16" data-aos="fade-down">
      <h2 class="text-4xl md:text-6xl text-(--fg-color) font-extrabold mb-6 leading-tight">
        نخبة من <span class="text-primary-500">المبدعين</span>
      </h2>
      <p class="text-(--muted-fg) font-medium text-lg md:text-xl max-w-2xl mx-auto leading-relaxed">
        فريقنا يعمل بشغف لتطوير حلول ذكية تساعدك على استعادة التحكم في وقتك وحياتك.
      </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10 items-stretch">
      @for (member of teamMembers; track member.name; let i = $index) { 
        <div [attr.data-aos]="'fade-up'" [attr.data-aos-delay]="i * 100">
          <div
          class="group bg-(--card-bg) border border-(--border-color) shadow-(--shadow-main) rounded-[2.5rem] p-8 text-center transition-all duration-500 hover:shadow-2xl hover:-translate-y-3 flex flex-col items-center"
        >
          <div class="relative mb-6">
            <div
              class="absolute inset-0 bg-primary-500/10 blur-2xl rounded-full scale-0 group-hover:scale-125 transition-transform duration-700"
            ></div>
            <div
              class="relative w-36 h-36 md:w-44 md:h-44 rounded-full overflow-hidden border-4 border-(--bg-color) shadow-md"
            >
              <img
                [src]="member.image"
                [alt]="member.name"
                class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
              />
            </div>
          </div>

          <h3
            class="text-2xl md:text-3xl text-(--fg-color) font-bold mb-2 transition-colors duration-300 group-hover:text-primary-500"
          >
            {{ member.name }}
          </h3>
          <p class="text-(--muted-fg) font-semibold text-lg mb-8">
            {{ member.role }}
          </p>

          <div class="flex items-center gap-3 mt-auto">
            @for (social of member.socials; track social.platform) {
              <a
                [href]="social.link"
                target="_blank"
                class="flex items-center justify-center w-11 h-11 rounded-xl border border-(--border-color) text-(--muted-fg) transition-all duration-300 hover:bg-primary-500 hover:text-white hover:border-primary-500 hover:rotate-12"
                [title]="social.platform"
              >
                <app-icon
                  [iconName]="social.icon"
                  [iconSize]="22"
                  [iconColor]="'#6b7280'"
                ></app-icon>
              </a>
            }
          </div>
        </div>
        </div>
      }
    </div>

    <div class="text-center mt-20" data-aos="zoom-in">
      <button
        class="btn-main-red w-auto! px-10 h-14 rounded-2xl! text-xl shadow-lg shadow-primary-500/30 hover:shadow-primary-500/50 transition-all active:scale-95"
      >
        ابدأ رحلتك الآن
      </button>
    </div>
  </div>
</section>
