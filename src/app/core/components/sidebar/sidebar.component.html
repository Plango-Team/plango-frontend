<div class="flex h-full flex-col text-ink-fg">
  <div class="flex h-16 items-center border-b border-ink-border px-6">
    <a
      class="inline-flex items-center gap-2"
      [routerLink]="shellHomeRoute()"
      aria-label="PlanGo home"
    >
      <img
        [src]="
          !themeService.isDark() ? 'images/planGo-BlackLogo.svg' : 'images/planGo-WhiteLogo.svg'
        "
        alt="PlanGo"
      />
    </a>
  </div>

  <div class="px-3 py-4">
    <button
      class="flex h-10 w-full items-center justify-start gap-2 rounded-lg bg-ink-fg px-4 text-sm font-medium text-ink hover:bg-ink-fg/90 transition-all"
    >
      <app-icon
        [iconName]="quickActionIcon()"
        [iconSize]="16"
        [iconColor]="'currentColor'"
      ></app-icon>
      {{ quickActionLabel() }}
    </button>
  </div>

  <nav class="flex-1 space-y-1 px-3">
    @for (item of navItems(); track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-ink-3 font-medium text-ink-fg"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm transition text-ink-muted hover:bg-ink-3 hover:text-ink-fg"
      >
        <app-icon [iconName]="item.icon" [iconSize]="16" [iconColor]="'currentColor'"></app-icon>
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="p-3">
    <div class="rounded-xl border border-ink-border bg-ink p-4">
      <div class="flex items-center gap-2 text-xs text-ink-fg">
        <app-icon
          [iconName]="'StarIcon'"
          [iconSize]="14"
          [iconColor]="'var(--color-brand)'"
        ></app-icon>
        <span class="font-medium">{{
          authStore.user()?.accountType === 'organization'
            ? 'لوحة المؤسسة المتقدمة'
            : 'ترقية للنسخة الاحترافية'
        }}</span>
      </div>
      <p class="mt-1 text-[11px] text-ink-muted">{{ quickActionDescription() }}</p>
      <button
        class="mt-3 h-8 w-full rounded-md bg-brand text-xs font-semibold text-brand-foreground hover:bg-brand/90 transition-all"
      >
        {{ quickActionButtonLabel() }}
      </button>
    </div>
  </div>
</div>
