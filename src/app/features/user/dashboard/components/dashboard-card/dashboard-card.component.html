<div class="bg-(--card-bg) rounded-2xl p-4 flex items-center gap-3 shadow-lg shadow-(--main-shadow-color) border border-neutral-100 min-w-25">
  <div class="p-2 rounded-xl" [style.background]="iconBackGround()">
    <app-icon 
      [iconName]="iconName()" 
      [iconSize]="24" 
      [iconColor]="iconColor()">
    </app-icon>
  </div>
  <div class="flex flex-col text-right">
    <span class="text-xl text-(--muted-fg) font-medium">{{ title() }}</span>
    <span class="text-lg font-bold text-(--fg-color)">{{ value() }}</span>
  </div>
</div>
