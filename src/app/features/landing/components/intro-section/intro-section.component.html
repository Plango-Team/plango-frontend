<section
  class="relative w-full min-h-screen flex items-center bg-(--bg-color) md:pb-20 pt-30 lg:pt-22"
  dir="rtl"
>
  <!-- Decorative Background Elements -->
  <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-primary-500/5 rounded-full blur-[120px] -translate-y-1/2 translate-x-1/4"></div>
  <div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-primary-500/3 rounded-full blur-[100px] translate-y-1/2 -translate-x-1/4"></div>

  <div class="container mx-auto px-6 md:px-12 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center relative z-10">
    <div
      class="flex flex-col gap-6 md:gap-8 order-2 lg:order-1 text-center lg:text-right"
      data-aos="fade-left"
      data-aos-duration="1000"
    >
      <!-- Badge -->
      <div class="flex justify-center lg:justify-start" data-aos="fade-down" data-aos-delay="200">
        <span class="inline-flex items-center gap-2 bg-primary-500/10 text-primary-500 px-4 py-2 rounded-full text-sm font-bold border border-primary-500/20">
          <span class="w-2 h-2 bg-primary-500 rounded-full animate-pulse"></span>
          تطبيق ذكي لإدارة وقتك
        </span>
      </div>

      <h1
        class="text-5xl md:text-6xl lg:text-7xl text-(--fg-color) font-extrabold leading-[1.1] tracking-tight"
      >
        <span class="block mb-2">خطّط بذكاء،</span>
        <span class="block text-primary-500 mb-2">ووفّر مجهودك</span>
        <span class="block text-(--fg-color)"
          >وكن في الموعد <span class="text-primary-500">دائماً.</span></span
        >
      </h1>

      <!-- Red accent line -->
      <div class="flex justify-center lg:justify-start">
        <div class="w-20 h-1.5 bg-gradient-to-l from-primary-500 to-primary-300 rounded-full"></div>
      </div>

      <div class="max-w-xl mx-auto lg:mx-0">
        <p class="text-(--muted-fg) font-medium mb-8 md:mb-10 text-lg md:text-xl leading-relaxed">
          إتقان المواعيد النهائية (Deadlines)، التحكم الكامل في جداولك اليومية، وإدارة وقتك وتجمعاتك
          بكل سهولة مع
          <span class="text-primary-600 font-bold">Plan Go </span>.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-4">
          <a
            routerLink="/auth/signup"
            class="btn-main-red w-full sm:w-auto !rounded-xl shadow-lg shadow-primary-500/20 active:scale-95 transition-all duration-300 hover:shadow-primary-500/40"
          >
            ابدأ تجربتك المجانية
          </a>
          <a
            routerLink="/"
            fragment="features"
            class="btn-main-white w-full sm:w-auto !rounded-xl border border-(--border-color) hover:bg-primary-50 dark:hover:bg-primary-900/10 active:scale-95 transition-all duration-300"
          >
            اكتشف المميزات
          </a>
        </div>
      </div>
    </div>

    <div class="relative order-1 lg:order-2 flex justify-center items-center" data-aos="zoom-in" data-aos-duration="1200">
      <div
        class="absolute inset-0 bg-primary-500/10 blur-[100px] md:blur-[140px] rounded-full scale-75"
      ></div>

      <img
        src="/images/meeting.png"
        alt="Plan Go Meeting"
        class="relative w-full max-w-112.5 lg:max-w-full h-auto drop-shadow-2xl animate-wiggle"
        [style.animation-play-state]="isTop ? 'running' : 'paused'"
      />

      <div
        class="absolute -bottom-2 lg:bottom-10 -right-2 lg:-right-8 bg-(--card-bg)/90 backdrop-blur-md p-4 md:p-5 rounded-2xl shadow-2xl border border-(--border-color) flex items-center gap-4 animate-bounce-slow"
        data-aos="fade-up"
        data-aos-delay="600"
      >
        <div
          class="w-10 h-10 md:w-12 md:h-12 bg-green-300 dark:bg-green-900 rounded-full flex items-center justify-center"
          [style.background]="themeService.isDark() ? '#0d542b' : '#7bf1a8'"
          >
          <app-icon
            [iconName]="'Tick01FreeIcons'"
            [iconSize]="24"
            [iconColor]="'var(--fg-color)'"
          ></app-icon>
        </div>

        <div class="flex flex-col">
          <span class="text-[10px] md:text-xs font-bold text-primary-500 uppercase tracking-wider"
            >موعد قادم :</span
          >
          <span class="font-bold text-base md:text-lg text-(--fg-color)">اجتماع مع الفريق</span>
        </div>
      </div>

      <!-- Decorative floating badge -->
      <div
        class="absolute top-10 -left-4 lg:top-20 lg:-left-8 bg-(--card-bg)/90 backdrop-blur-md px-4 py-3 rounded-xl shadow-xl border border-(--border-color) hidden lg:flex items-center gap-3"
        data-aos="fade-down"
        data-aos-delay="800"
      >
        <div class="w-8 h-8 bg-primary-500/10 rounded-lg flex items-center justify-center">
          <app-icon [iconName]="'Calendar01FreeIcons'" [iconSize]="18" [iconColor]="'#d32e18'"></app-icon>
        </div>
        <div>
          <span class="text-xs font-bold text-(--fg-color) block">12 موعد هذا الأسبوع</span>
          <span class="text-[10px] text-green-500 font-bold">↑ 95% التزام</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <a routerLink="/" fragment="why">
    <div class="animate-pushUp hidden absolute bottom-0 left-1/2 -translate-x-1/2 md:flex flex-col items-center gap-2 opacity-50 hover:opacity-100 transition-opacity">
    <span class="text-xs text-(--muted-fg) font-medium">اكتشف المزيد</span>
    <div class="w-5 h-8 rounded-full border-2 border-(--muted-fg) flex justify-center pt-1">
      <div class="w-1 h-2 bg-(--muted-fg) rounded-full animate-bounce"></div>
    </div>
  </div>
  </a>
</section>
