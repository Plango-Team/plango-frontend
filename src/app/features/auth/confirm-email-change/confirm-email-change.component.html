<section class="verify-page">
  <div class="card">
    <h1>{{ 'auth.confirmEmail.title' | translate }}</h1>

    <div class="status">
      @if (!token()) {
      <p class="error">
        {{ 'auth.verifyEmail.missingToken' | translate }}
      </p>
      }

      @if (token() && loading()) {
      <p>
        {{ 'auth.verifyEmail.checking' | translate }}
      </p>
      }

      @if (errorMessage()) {
      <p class="error">
        {{ errorMessage() }}
      </p>
      }

      @if (store.error()) {
      <p class="error">
        {{ store.error() }}
      </p>
      }
    </div>

    <button type="button" class="action-button" (click)="goToLogin()">
      {{ 'auth.backToLogin' | translate }}
    </button>
  </div>
</section>
