<div class="min-h-screen bg-ink text-ink-foreground">
  @if (mobileSidebarOpen()) {
    <button
      type="button"
      class="fixed inset-0 z-40 bg-black/55 lg:hidden"
      (click)="closeMobileSidebar()"
      aria-label="Close sidebar"
    ></button>

    <aside
      class="fixed inset-y-0 start-0 z-50 h-screen w-72 border-e border-ink-border bg-ink-2/95 shadow-2xl backdrop-blur lg:hidden"
      (click)="closeMobileSidebar()"
    >
      <app-sidebar></app-sidebar>
    </aside>
  }

  <div class="flex">
    <!-- Desktop sidebar -->
    <aside class="sticky top-0 hidden h-screen w-64 shrink-0 border-e border-ink-border bg-ink-2/60 backdrop-blur lg:block">
      <app-sidebar></app-sidebar>
    </aside>

    <!-- Main -->
    <div class="min-w-0 flex-1 flex flex-col min-h-screen">
      <!-- Topbar -->
      <header class="sticky top-0 z-30 border-b border-ink-border bg-ink/80 backdrop-blur">
        <app-navbar (sidebarToggle)="toggleMobileSidebar()"></app-navbar>
      </header>

      <main class="animate-fade-up flex-1">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</div>
