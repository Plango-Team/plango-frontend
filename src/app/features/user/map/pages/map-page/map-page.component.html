<div class="mb-2 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between px-4 mt-5">
  <div>
    <h1 class="font-display text-2xl tracking-tight sm:text-3xl text-ink-fg">الخريطة الذكية</h1>
    <div class="text-sm text-ink-muted">تتبَع رحلاتك المشتركة و اكتشف الفعاليات حولك</div>
  </div>
  <div class="sm:">
    <button class="flex items-center justify-center w-full gap-2 rounded-lg bg-brand px-4 py-2 text-sm font-semibold text-brand-foreground hover:bg-brand/90 transition-all">
        <app-icon [iconName]="'AddTeamIcon'" [iconSize]="16" [iconColor]="'currentColor'"></app-icon>
        ادعُ أصدقاء
    </button>
  </div>
</div> 

<!-------------------------------------------------------->

<div class="grid grid-cols-12 gap-4 min-h-screen w-full p-4" dir="rtl">

  <div [class]="isFullScreen()? 'col-span-12 lg:col-span-12 relative ease-in-out transition-all duration-1000':'col-span-12 lg:col-span-8'"
  class="col-span-12 lg:col-span-8 h-[80vh] lg:h-full w-full rounded-2xl overflow-hidden border border-ink-border bg-ink-2 shadow-soft transition-all duration-500 hover:border-ink-fg/30">
    <app-map></app-map>
  @if (isFullScreen()) {
    <button (click)="toggelFullScreen()" class="absolute top-[50%] left-3 p-2 rounded-lg bg-ink-2 shadow-soft">
       <app-icon [iconName]="'ArrowLeft05FreeIcons'" [iconColor]="'#d32e18'"></app-icon>
    </button>
  }
  </div> 
  <div [class]="isFullScreen()?'col-span-12 lg:col-span-1 hidden':'col-span-12 lg:col-span-4'"
  class="col-span-12 lg:col-span-4 flex flex-col gap-5 min-h-full">
    <app-card class="flex-1 block lg:col-span-5" customClass="flex flex-col justify-center text-ink-fg h-full">
    <div class="flex items-center justify-between gap-2">
      <h3 class="font-display text-lg">رحلة نشطة</h3>
      <span class="px-2 py-0.5 rounded-2xl bg-(--success-bg) text-xs text-success inline-flex items-center gap-1">
         مباشر
      </span>
    </div>
    <div class="mt-2 text-sm text-ink-muted">إلي: {{mapStore.trips()[0].location}}</div>
    <div class="mt-3 grid grid-cols-3 gap-4">
      <div>
        <div class="font-bold flex items-center xl:items-baseline gap-1 text-2xl md:text-xs xl:text-xl tracking-tight sm:text-3xl">
          {{mapStore.trips()[0].remainingTime}} <span class="text-lg md:text-sm xl:text-lg font-medium">د متبقية</span>
        </div>
      </div>
    </div>
    <div class="mt-5 h-2 overflow-hidden rounded-full bg-ink-3">
      <div class="h-full rounded-full bg-primary-500 transition-all" style="width: 30%"></div>
    </div>
    <button (click)="toggelFullScreen() ; mapComponent.drawFullRoute()" class="mt-4 flex h-10 w-full items-center justify-center gap-2 rounded-lg bg-ink-fg px-4 text-sm font-medium text-ink hover:bg-ink-fg/90 transition-all">
      عرض المسار الكامل
    </button>
    </app-card>

    <div class="flex-1 rounded-2xl bg-ink-2 p-5 sm:p-6 shadow-soft border border-ink-border transition-all hover:border-ink-fg/30">
       <app-trips></app-trips>
    </div>

    <div class="rounded-2xl border border-ink-border bg-ink-2 p-5 sm:p-6 shadow-soft transition-all hover:border-ink-fg/30">
      <div class="flex">
        <app-icon [iconName]="'StarIcon'" [iconSize]="20" [iconColor]="'var(--color-brand)'"></app-icon>
      </div>
      <p class="font-semibold text-xl mt-3">نقاط ساخنة قريبة</p>
      <p class="mt-1 text-sm text-ink-muted">3 فعاليات عامة تبدأ خلال الساعتين القادمتين</p>
      <button class="mt-5 h-8 w-full lg:w-25 rounded-md bg-brand text-xs font-semibold text-brand-foreground hover:bg-brand/90 transition-all">
        استكشف
      </button>
    </div>
    
  </div>

</div>
