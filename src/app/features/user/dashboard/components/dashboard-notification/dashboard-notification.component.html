<section class="mt-8 bg-(--card-bg) pt-4 rounded-2xl shadow-lg shadow-(--main-shadow-color)">
  <div class="flex items-center justify-between px-3 pb-4 border-b border-(--border-color)">
    <h2 class="text-2xl font-bold text-(--fg-color)">مواعيدك القادمة</h2>
    <button class="text-sm text-primary-500 flex items-center gap-0.5 cursor-pointer hover:scale-110 transition-all duration-500">
      <app-icon [iconName]="'Delete02Icon'" [iconSize]="14" [iconColor]="'#d32e18'"></app-icon>
        مسح الكل
    </button>
  </div>

  <div class="flex flex-col gap-3">
    @for (notifiction of notifictions(); track notifiction.id) {
      <div class="flex items-center justify-between px-4 py-2 rounded-2xl border-b border-gray-100">
        
        <div class="flex items-center gap-4">
          <div class="bg-(--input-bg) p-2.5 rounded-xl flex items-center justify-center">
             <app-icon 
                [iconName]="notifiction.iconName" 
                [iconSize]="20" 
                [iconColor]="'#d32e18'">
             </app-icon>
          </div>

           <div class="flex flex-col text-right">
            <span class="text-lg font-bold text-(--fg-color)">{{ notifiction.title }}</span>
            <span class="text-xs text-(--muted-fg) mt-0.5">{{ notifiction.date }}</span>
          </div>
        </div>
        </div>
    } @empty {
      <div class="flex items-center justify-center gap-2 text-center py-10 rounded-2xl border border-dashed border-gray-200">
        <app-icon [iconName]="'SearchSlash'" [iconColor]="'#d32e18'"></app-icon>
        <p class="text-primary-500 text-lg">لا توجد تنبيهات مؤخراً</p>
      </div>
    }
  </div>
</section>
