<nav
  class="bg-(--card-bg)/80 backdrop-blur-md px-4 md:px-12 fixed w-full z-30 top-0 inset-x-0 border-b border-(--border-color) transition-all duration-300"
>
  <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between h-20">
    <div class="flex items-center order-1 md:w-1/4 justify-start">
      <a routerLink="/" (click)="closeMenu()" class="flex items-center">
        <img
          src="/images/PlanGoLogo.png"
          class="dark:hidden h-10 md:h-12 w-auto object-contain"
          alt="PlanGo Logo"
        />
        <img
          src="/images/PlanGoLogo-darkMode.png"
          class="hidden dark:block h-10 md:h-12 w-auto object-contain"
          alt="PlanGo Logo"
        />
      </a>
    </div>

    <div class="flex items-center gap-2 md:gap-4 order-2 md:order-3 md:w-1/4 justify-end">
      <button
        (click)="toggleTheme()"
        class="p-2 text-(--fg-color) hover:bg-primary-50 dark:hover:bg-primary-900/30 rounded-full transition-all cursor-pointer group"
      >
        <svg
          class="hidden dark:block w-6 h-6 transition-transform group-hover:rotate-45"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="4" />
          <path
            d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
          />
        </svg>
        <svg
          class="block dark:hidden w-6 h-6 transition-transform group-hover:-rotate-12"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </svg>
      </button>

      @if (!authStore.user()) {
        <button
          type="button"
          routerLink="/auth/login"
          class="btn-main-red hidden sm:flex items-center justify-center scale-90 md:scale-100"
        >
          ابدأ الآن
        </button>
      } @else {
        <div class="relative group">
          <div
            class="flex items-center gap-3 bg-(--input-bg) p-1.5 pr-4 rounded-full border border-(--border-color) hover:border-primary-500/50 transition-all cursor-pointer"
          >
            <div class="flex flex-col items-end hidden md:flex">
              <span class="text-sm font-bold text-(--fg-color) leading-none">{{
                authStore.user()?.firstName
              }}</span>
              <span class="text-[10px] text-(--muted-fg) font-medium italic">مخطط ذكي</span>
            </div>
            <div
              class="w-10 h-10 rounded-full bg-primary-500 flex items-center justify-center text-white font-bold border-2 border-(--card-bg) shadow-sm"
            >
              {{ authStore.user()?.firstName?.charAt(0) }}
            </div>
          </div>

          <div
            class="absolute top-full left-0 w-48 pt-2 hidden group-hover:block z-50 animate-in fade-in slide-in-from-top-1"
          >
            <div
              class="bg-(--card-bg) border border-(--border-color) rounded-xl shadow-xl py-2 overflow-hidden"
            >
              <a
                routerLink="/dashboard"
                (click)="closeMenu()"
                class="block px-4 py-2 text-sm text-(--fg-color) hover:bg-primary-500 hover:text-white transition-colors duration-200"
              >
                لوحة التحكم
              </a>

              <a
                routerLink="/profile"
                (click)="closeMenu()"
                class="block px-4 py-2 text-sm text-(--fg-color) hover:bg-primary-500 hover:text-white transition-colors duration-200"
              >
                الملف الشخصي
              </a>

              <hr class="my-1 border-(--border-color)" />

              <button
                (click)="logout()"
                class="w-full text-right px-4 py-2 text-sm text-red-500 hover:bg-red-500 hover:text-white transition-colors duration-200 cursor-pointer"
              >
                تسجيل الخروج
              </button>
            </div>
          </div>
        </div>
      }

      <button
        (click)="toggleMenu()"
        type="button"
        class="inline-flex items-center p-2 text-(--fg-color) rounded-lg md:hidden hover:bg-primary-50"
      >
        <svg
          class="w-7 h-7"
          [class.hidden]="isMenuOpen()"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16m-7 6h7"
          />
        </svg>
        <svg
          class="w-7 h-7"
          [class.hidden]="!isMenuOpen()"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <div
      [class.hidden]="!isMenuOpen()"
      class="w-full md:flex md:items-center md:justify-center md:order-2 md:flex-1 transition-all duration-300"
    >
      <ul
        class="flex flex-col md:flex-row items-center gap-6 md:gap-10 mt-4 md:mt-0 p-6 md:p-0 bg-(--card-bg) md:bg-transparent rounded-2xl md:rounded-none border border-(--border-color) md:border-0 shadow-xl md:shadow-none"
      >
        <li>
          <a
            routerLink="/"
            fragment="why"
            (click)="closeMenu()"
            [class.active]="activeFragment() === 'why'"
            class="nav-link"
            >عن بلان جو</a
          >
        </li>
        <li>
          <a
            routerLink="/"
            fragment="features"
            (click)="closeMenu()"
            [class.active]="activeFragment() === 'features'"
            class="nav-link"
            >المميزات</a
          >
        </li>
        <li>
          <a
            routerLink="/"
            fragment="start"
            (click)="closeMenu()"
            [class.active]="activeFragment() === 'start'"
            class="nav-link"
            >كيف يعمل</a
          >
        </li>
        <li>
          <a
            routerLink="/"
            fragment="subscribtion"
            (click)="closeMenu()"
            [class.active]="activeFragment() === 'subscribtion'"
            class="nav-link"
            >الأسعار</a
          >
        </li>
        <li>
          <a
            routerLink="/"
            fragment="team"
            (click)="closeMenu()"
            [class.active]="activeFragment() === 'team'"
            class="nav-link"
            >الفريق</a
          >
        </li>

        <li class="md:hidden w-full pt-4 border-t border-(--border-color)">
          @if (!authStore.user()) {
            <a routerLink="/auth/login" (click)="closeMenu()" class="btn-main-red w-full"
              >ابدأ الآن</a
            >
          } @else {
            <button
              (click)="logout()"
              class="btn-main-red w-full bg-red-500 hover:bg-red-600 italic"
            >
              تسجيل الخروج
            </button>
          }
        </li>
      </ul>
    </div>
  </div>
</nav>
